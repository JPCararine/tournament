spring.application.name=project

# ---------------------------------------------------------------------------
# Banco de dados (PostgreSQL gerenciado - Supabase/Neon)
# ---------------------------------------------------------------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------------------------------
# Asaas (gateway Pix)
# ---------------------------------------------------------------------------
asaas.api-url=${ASAAS_API_URL:https://api-sandbox.asaas.com}
asaas.api-key=${ASAAS_API_KEY}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN}
asaas.pix-key=${ASAAS_PIX_KEY}
# Valor da taxa de inscrição em centavos (ex.: 5000 = R$ 50,00)
asaas.amount-cents=${ASAAS_AMOUNT_CENTS:5000}
# Prazo de expiração da cobrança Pix, em segundos (3600 = 1 hora). É o mesmo
# valor enviado como "expirationSeconds" ao Asaas e usado para remover
# automaticamente as equipes que continuarem PENDENTES após esse prazo.
asaas.pix-expires-seconds=${ASAAS_PIX_EXPIRES_SECONDS:3600}
# Intervalo (ms) entre as varreduras que removem equipes pendentes expiradas.
app.pending-cleanup.interval-ms=${PENDING_CLEANUP_INTERVAL_MS:60000}

# ---------------------------------------------------------------------------
# E-mail transacional (SMTP relay do SendGrid)
# Usuário é literalmente "apikey"; a senha é a própria SENDGRID_API_KEY.
# Via SMTP conseguimos imagem inline (cid:) que o Gmail renderiza de forma confiável.
# ---------------------------------------------------------------------------
sendgrid.from-email=${SENDGRID_FROM_EMAIL}
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ---------------------------------------------------------------------------
# Aplicação
# ---------------------------------------------------------------------------
app.discord-invite-url=${DISCORD_INVITE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# URL pública do backend (usada para servir o QR Code Pix nas imagens do e-mail).
# Em dev, aponte para o domínio do ngrok; em produção, para o domínio real.
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# ---------------------------------------------------------------------------
# Campeonato (dados exibidos no e-mail de inscrição)
# ---------------------------------------------------------------------------
app.tournament.name=ESL ITAP
app.tournament.max-teams=16
app.tournament.date=04 JUL
# Premiação = base + (equipes confirmadas * incremento), em reais.
app.tournament.prize-base=1000
app.tournament.prize-per-team=50
